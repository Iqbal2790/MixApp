<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixtape — desain UI</title>
<style>
  :root {
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;

    /* type scale, ratio ~1.15, product register: tighter than brand */
    --fs-xs: 0.8rem;
    --fs-sm: 0.9rem;
    --fs-base: 1rem;
    --fs-md: 1.15rem;
    --fs-lg: 1.4rem;
    --fs-xl: 1.75rem;

    --radius-sm: 6px;
    --radius-md: 10px;

    --ease: cubic-bezier(0.22, 1, 0.36, 1); /* ease-out-quart */

    /* light theme — neutral tinted warm, accent coral-orange */
    --bg: oklch(97.5% 0.008 60);
    --bg-raised: oklch(99% 0.006 60);
    --panel: oklch(94.5% 0.01 60);
    --text: oklch(22% 0.015 60);
    --text-muted: oklch(45% 0.015 60);
    --border: oklch(88% 0.012 60);
    --accent: oklch(68% 0.16 45);
    --accent-text: oklch(99% 0.01 45);
    --accent-soft: oklch(93% 0.05 45);
    --accent-b: oklch(60% 0.14 250); /* secondary hue for crossfade B */
  }

  [data-theme="dark"] {
    --bg: oklch(20% 0.012 60);
    --bg-raised: oklch(24% 0.014 60);
    --panel: oklch(27% 0.015 60);
    --text: oklch(94% 0.008 60);
    --text-muted: oklch(68% 0.015 60);
    --border: oklch(33% 0.015 60);
    --accent: oklch(72% 0.15 45);
    --accent-text: oklch(15% 0.02 45);
    --accent-soft: oklch(32% 0.06 45);
    --accent-b: oklch(70% 0.13 250);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: var(--fs-base);
    line-height: 1.5;
    transition: background 200ms var(--ease), color 200ms var(--ease);
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem 1.5rem 7rem;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  /* header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wordmark {
    font-size: var(--fs-lg);
    font-weight: 650;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .wordmark .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    cursor: pointer;
    font-size: var(--fs-xs);
    color: var(--text-muted);
    font-family: inherit;
  }
  .theme-toggle button {
    all: unset;
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    color: inherit;
    transition: background 150ms var(--ease), color 150ms var(--ease);
  }
  .theme-toggle button[aria-pressed="true"] {
    background: var(--bg-raised);
    color: var(--text);
    font-weight: 600;
  }

  /* input */
  .add-track {
    display: flex;
    gap: 0.6rem;
  }
  .add-track input {
    flex: 1;
    font: inherit;
    font-size: var(--fs-sm);
    padding: 0.75rem 0.9rem;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-raised);
    color: var(--text);
    outline: none;
    transition: border-color 150ms var(--ease), box-shadow 150ms var(--ease);
  }
  .add-track input::placeholder { color: var(--text-muted); }
  .add-track input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .add-track button {
    font: inherit;
    font-size: var(--fs-sm);
    font-weight: 600;
    padding: 0.75rem 1.1rem;
    border-radius: var(--radius-md);
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    cursor: pointer;
    transition: transform 150ms var(--ease), filter 150ms var(--ease);
  }
  .add-track button:hover { filter: brightness(1.05); }
  .add-track button:active { transform: scale(0.97); }
  .add-track button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* section label */
  .section-label {
    font-size: var(--fs-xs);
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.75rem;
  }

  /* queue */
  .queue { display: flex; flex-direction: column; }
  .track {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    padding: 0.85rem 0.25rem;
    border-bottom: 1px solid var(--border);
  }
  .track:first-child { padding-top: 0.25rem; }
  .track:last-child { border-bottom: none; }

  .track-index {
    width: 1.6rem;
    text-align: center;
    font-size: var(--fs-sm);
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .track.playing .track-index { color: var(--accent); font-weight: 700; }

  .track-main { flex: 1; min-width: 0; }
  .track-title {
    font-size: var(--fs-sm);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-meta {
    font-size: var(--fs-xs);
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    gap: 0.5rem;
  }

  .track-actions {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    opacity: 0.5;
    transition: opacity 150ms var(--ease);
  }
  .track:hover .track-actions,
  .track:focus-within .track-actions { opacity: 1; }

  .icon-btn {
    all: unset;
    width: 1.9rem;
    height: 1.9rem;
    display: grid;
    place-items: center;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    cursor: pointer;
    font-size: var(--fs-sm);
  }
  .icon-btn:hover { background: var(--panel); color: var(--text); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* trim panel, contextual: revealed per track, not always visible */
  .trim-panel {
    display: none;
    padding: 0.75rem 0.5rem 0.9rem 2.5rem;
    font-size: var(--fs-xs);
    color: var(--text-muted);
  }
  .track.expanded .trim-panel { display: block; }
  .trim-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .trim-row input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }
  .trim-value {
    font-variant-numeric: tabular-nums;
    width: 3.2rem;
    text-align: right;
  }

  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-muted);
    font-size: var(--fs-sm);
    border: 1px dashed var(--border);
    border-radius: var(--radius-md);
    display: none;
  }
  .queue-wrap.is-empty .empty-state { display: block; }
  .queue-wrap.is-empty .queue { display: none; }

  /* player bar, fixed bottom */
  .player-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--bg-raised);
    border-top: 1px solid var(--border);
    padding: 0.9rem 1.25rem;
  }
  .player-inner {
    max-width: 640px;
    margin: 0 auto;
  }

  .now-playing {
    font-size: var(--fs-xs);
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .now-playing strong { color: var(--text); font-weight: 600; }

  .transport {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .transport-btn {
    all: unset;
    cursor: pointer;
    color: var(--text);
    display: grid;
    place-items: center;
    font-size: var(--fs-md);
  }
  .transport-btn.play {
    width: 2.4rem; height: 2.4rem;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-text);
  }
  .transport-btn:hover { filter: brightness(1.08); }
  .transport-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* crossfade indicator: two hues crossing, functional not decorative */
  .crossfade-track {
    flex: 1;
    height: 4px;
    border-radius: 999px;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }
  .crossfade-track .fill-a,
  .crossfade-track .fill-b {
    position: absolute;
    top: 0; bottom: 0;
    border-radius: 999px;
    transition: width 200ms linear;
  }
  .crossfade-track .fill-a { left: 0; width: 62%; background: var(--accent); }
  .crossfade-track .fill-b { right: 0; width: 22%; background: var(--accent-b); }

  .crossfade-duration {
    font-size: var(--fs-xs);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }
  .crossfade-duration select {
    font: inherit;
    font-size: var(--fs-xs);
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px 6px;
  }

  .shortcut-hint {
    text-align: center;
    font-size: var(--fs-xs);
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  kbd {
    font-family: inherit;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.75em;
  }
</style>
</head>
<body data-theme="light">
  <div class="app">
    <header>
      <div class="wordmark"><span class="dot"></span>Mixtape</div>
      <div class="theme-toggle" role="group" aria-label="Tema tampilan">
        <button type="button" data-theme-choice="light" aria-pressed="true">Light</button>
        <button type="button" data-theme-choice="dark" aria-pressed="false">Dark</button>
      </div>
    </header>

    <section>
      <div class="section-label">Tambah lagu</div>
      <div class="add-track">
        <input type="text" placeholder="Tempel link YouTube di sini…" />
        <button type="button">Tambah</button>
      </div>
    </section>

    <section class="queue-wrap">
      <div class="section-label">Antrian</div>

      <div class="queue">
        <div class="track playing expanded">
          <div class="track-index">1</div>
          <div class="track-main">
            <div class="track-title">Tycho — Awake</div>
            <div class="track-meta"><span>4:32</span><span>· sedang diputar</span></div>
          </div>
          <div class="track-actions">
            <button class="icon-btn" title="Atur trim" aria-label="Atur trim">✂</button>
            <button class="icon-btn" title="Hapus" aria-label="Hapus dari antrian">✕</button>
          </div>
        </div>
        <div class="trim-panel">
          <div class="trim-row">
            <span>Mulai</span>
            <input type="range" min="0" max="272" value="0" />
            <span class="trim-value">0:00</span>
          </div>
          <div class="trim-row">
            <span>Selesai</span>
            <input type="range" min="0" max="272" value="272" />
            <span class="trim-value">4:32</span>
          </div>
        </div>

        <div class="track">
          <div class="track-index">2</div>
          <div class="track-main">
            <div class="track-title">Bonobo — Kerala</div>
            <div class="track-meta"><span>4:15</span></div>
          </div>
          <div class="track-actions">
            <button class="icon-btn" title="Atur trim" aria-label="Atur trim">✂</button>
            <button class="icon-btn" title="Hapus" aria-label="Hapus dari antrian">✕</button>
          </div>
        </div>

        <div class="track">
          <div class="track-index">3</div>
          <div class="track-main">
            <div class="track-title">Nujabes — Feather</div>
            <div class="track-meta"><span>4:08</span></div>
          </div>
          <div class="track-actions">
            <button class="icon-btn" title="Atur trim" aria-label="Atur trim">✂</button>
            <button class="icon-btn" title="Hapus" aria-label="Hapus dari antrian">✕</button>
          </div>
        </div>
      </div>

      <div class="empty-state">
        Antrian masih kosong. Tempel link YouTube di atas buat mulai nyusun mixtape kamu.
      </div>
    </section>
  </div>

  <div class="player-bar">
    <div class="player-inner">
      <div class="now-playing">Sedang diputar: <strong>Tycho — Awake</strong></div>
      <div class="transport">
        <button class="transport-btn" aria-label="Lagu sebelumnya">⏮</button>
        <button class="transport-btn play" aria-label="Play/Pause">▶</button>
        <button class="transport-btn" aria-label="Lagu berikutnya">⏭</button>
        <div class="crossfade-track" aria-label="Progress crossfade">
          <div class="fill-a"></div>
          <div class="fill-b"></div>
        </div>
        <div class="crossfade-duration">
          Crossfade
          <select>
            <option>3s</option>
            <option selected>5s</option>
            <option>8s</option>
          </select>
        </div>
      </div>
      <div class="shortcut-hint"><kbd>Space</kbd> play/pause · <kbd>→</kbd> lagu berikutnya</div>
    </div>
  </div>

  <script>
    // Ini mockup UI (Fase 2 - desain). Belum ada logika YouTube/audio beneran.
    // Tema disimpan di memori JS aja untuk mockup ini; nanti di Fase 3 (implementasi)
    // baru dihubungkan ke pemutaran asli.
    const themeButtons = document.querySelectorAll('[data-theme-choice]');
    themeButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const choice = btn.getAttribute('data-theme-choice');
        document.body.setAttribute('data-theme', choice);
        themeButtons.forEach((b) =>
          b.setAttribute('aria-pressed', b === btn ? 'true' : 'false')
        );
      });
    });

    // Klik tombol trim (✂) untuk buka/tutup panel trim per lagu (contextual, sesuai DESIGN.md)
    document.querySelectorAll('.track-actions .icon-btn[title="Atur trim"]').forEach((btn) => {
      btn.addEventListener('click', () => {
        btn.closest('.track').classList.toggle('expanded');
      });
    });
  </script>
</body>
</html>
